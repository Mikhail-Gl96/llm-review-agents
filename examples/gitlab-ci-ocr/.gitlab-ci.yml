# Пример: AI-ревью каждого MR через open-code-review (ocr) → markdown-коммент в MR.
# Разложить в своём проекте:
#   .gitlab-ci.yml            (этот файл)  → корень репозитория
#   .gitlab/format_review.js  (рендер JSON→markdown)
#
# CI/CD variables (Settings → CI/CD → Variables, Masked, снять «Protect» для тест-веток):
#   DEEPSEEK_KEY  — ключ провайдера (см. ../../docs/providers.md; провайдер меняется ниже)
#   GITLAB_TOKEN  — Project Access Token, scope `api` (для постинга коммента)
#
# ВАЖНО: в проекте должны быть включены Merge Requests
#   (Settings → General → «Visibility, project features, permissions» → Merge requests).
stages: [review]

ocr_review:
  stage: review
  image: node:20
  needs: []                 # не тянуть артефакты других джоб
  variables:
    GIT_DEPTH: "0"          # полная история — нужна для merge-base с целевой веткой
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  script:
    - set -o pipefail
    - npm install -g @alibaba-group/open-code-review
    - ocr config set llm.url https://api.deepseek.com/chat/completions
    - ocr config set llm.auth_token "$DEEPSEEK_KEY"
    - ocr config set llm.model deepseek-v4-pro
    - ocr config set llm.use_anthropic false
    # В MR-пайплайне склонирована только исходная ветка — целевой нет.
    # Подтягиваем её и берём merge-base как базу диффа.
    - git fetch -q origin "$CI_MERGE_REQUEST_TARGET_BRANCH_NAME"
    - BASE=$(git merge-base FETCH_HEAD HEAD)
    - ocr review --from "$BASE" --to HEAD --audience agent --format json > ocr.json
    - node .gitlab/format_review.js < ocr.json > review.md
    - cat review.md
    - |
      curl -sS --fail --request POST \
        --header "PRIVATE-TOKEN: $GITLAB_TOKEN" \
        --data-urlencode "body@review.md" \
        "$CI_API_V4_URL/projects/$CI_PROJECT_ID/merge_requests/$CI_MERGE_REQUEST_IID/notes"
